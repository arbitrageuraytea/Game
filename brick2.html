<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2a2a2a;
            font-family: 'Chicago', 'Courier New', monospace;
            touch-action: pan-y;
            overflow: hidden;
        }
        
        .ipod-container {
            background: #d0d0d0;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 
                inset -2px -2px 5px rgba(0,0,0,0.2),
                inset 2px 2px 5px rgba(255,255,255,0.7),
                0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
        }
        
        .screen {
            background: #9cb896;
            border: 3px solid #4a4a4a;
            border-radius: 5px;
            padding: 8px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .info-bar {
            background: #9cb896;
            color: #000;
            font-size: 11px;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #000;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        canvas {
            background: #9cb896;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        
        .controls {
            margin-top: 15px;
            text-align: center;
        }
        
        button {
            background: #e0e0e0;
            color: #000;
            border: 2px solid #4a4a4a;
            padding: 12px 24px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 
                2px 2px 5px rgba(0,0,0,0.3),
                inset 1px 1px 2px rgba(255,255,255,0.7);
            font-family: 'Chicago', 'Courier New', monospace;
            touch-action: manipulation;
        }
        
        button:active {
            box-shadow: 
                inset 2px 2px 5px rgba(0,0,0,0.3),
                1px 1px 2px rgba(255,255,255,0.7);
        }
        
        .message {
            color: #000;
            font-size: 12px;
            margin: 8px 0;
            font-weight: bold;
            min-height: 20px;
            letter-spacing: 1px;
        }

        .leaderboard {
            background: #9cb896;
            border: 3px solid #4a4a4a;
            border-radius: 5px;
            padding: 12px;
            margin-top: 15px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }

        .leaderboard-title {
            font-size: 13px;
            font-weight: bold;
            color: #000;
            margin-bottom: 8px;
            letter-spacing: 1px;
            border-bottom: 2px solid #000;
            padding-bottom: 4px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            font-size: 11px;
            color: #000;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .leaderboard-entry:last-child {
            border-bottom: none;
        }

        .leaderboard-rank {
            font-weight: bold;
            margin-right: 8px;
        }

        .leaderboard-name {
            flex: 1;
            text-align: left;
        }

        .leaderboard-score {
            font-weight: bold;
        }

        .name-input-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .name-input-box {
            background: #d0d0d0;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #4a4a4a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .name-input-box h3 {
            color: #000;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .name-input-box input {
            padding: 10px;
            font-size: 14px;
            border: 2px solid #4a4a4a;
            border-radius: 5px;
            width: 200px;
            font-family: 'Chicago', 'Courier New', monospace;
            margin-bottom: 15px;
        }

        .name-input-box button {
            margin: 5px;
        }

        @media (max-width: 480px) {
            .ipod-container {
                padding: 10px;
            }
            
            button {
                padding: 15px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="ipod-container">
        <div class="screen">
            <div class="info-bar">
                <span>♥<span id="lives">3</span></span>

                <button id="pauseBtn" style="display: none; padding: 8px 16px; font-size: 12px; margin-right: 5px;">⏸ PAUSE</button>

    <!-- Name Input Modal -->

        <div class="name-input-box">
            <h3 id="modalTitle">🎉 NEW HIGH SCORE!</h3>

            <div id="promoSection" style="display: none; margin-top: 10px;">
                <p style="color: #000; font-size: 12px; margin-bottom: 5px;">Got a promo code?</p>
                <input type="text" id="promoCode" placeholder="Promo code (optional)" maxlength="20" style="width: 200px; padding: 8px; font-size: 12px; text-transform: uppercase;">
                <p id="promoMessage" style="color: #000; font-size: 11px; margin-top: 5px; min-height: 15px;"></p>

    <!-- Fireball Promo Modal -->
    <div class="name-input-modal" id="fireballModal" style="display: none;">
        <div class="name-input-box">

            <p style="color: #000; margin-bottom: 10px;">Ball with 6 spikes to destroy more bricks!</p>
            <input type="text" id="minePromo" placeholder="Enter code" maxlength="20" style="text-transform: uppercase;">
            <p id="mineMessage" style="color: #000; font-size: 11px; margin-top: 5px; min-height: 15px;"></p>

            <button id="activateMine">Activate</button>

        </div>
    </div>

    <script>
        // ===== FIREBASE CONFIGURATION =====
        const firebaseConfig = {
            apiKey: "AIzaSyDRZNwfutN44rNE8tJe0IMk8aeG26jZWH8",
            authDomain: "brickbreak80.firebaseapp.com",
            databaseURL: "https://brickbreak80-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "brickbreak80",
            storageBucket: "brickbreak80.firebasestorage.app",
            messagingSenderId: "1082240822554",
            appId: "1:1082240822554:web:3efbfaa02ea119ca4ed0a3",
            measurementId: "G-DX4R5WL1HN"
        };

        // Initialize Firebase (will be disabled if config not set)
        let database = null;
        let firebaseEnabled = false;
        
        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                firebase.initializeApp(firebaseConfig);
                database = firebase.database();
                firebaseEnabled = true;
                console.log("Firebase connected!");
            } else {
                console.log("Firebase not configured - using local storage");
            }
        } catch (error) {
            console.log("Firebase error - using local storage:", error);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const messageEl = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const fireballBtn = document.getElementById('fireballBtn');
        const mineBtn = document.getElementById('mineBtn');
        const nameModal = document.getElementById('nameModal');
        const modalTitle = document.getElementById('modalTitle');
        const playerNameInput = document.getElementById('playerName');
        const submitScoreBtn = document.getElementById('submitScore');
        const skipScoreBtn = document.getElementById('skipScore');
        const finalScoreEl = document.getElementById('finalScore');
        const leaderboardList = document.getElementById('leaderboardList');
        const promoSection = document.getElementById('promoSection');
        const promoCodeInput = document.getElementById('promoCode');
        const promoMessage = document.getElementById('promoMessage');
        
        // Fireball modal
        const fireballModal = document.getElementById('fireballModal');
        const fireballPromoInput = document.getElementById('fireballPromo');
        const fireballMessage = document.getElementById('fireballMessage');
        const activateFireballBtn = document.getElementById('activateFireball');
        const cancelFireballBtn = document.getElementById('cancelFireball');
        
        // Mine modal
        const mineModal = document.getElementById('mineModal');
        const minePromoInput = document.getElementById('minePromo');
        const mineMessage = document.getElementById('mineMessage');
        const activateMineBtn = document.getElementById('activateMine');
        const cancelMineBtn = document.getElementById('cancelMine');

        // iPod monochrome colors
        const BG_COLOR = '#9cb896';
        const FG_COLOR = '#000000';

        // ===== SOUND EFFECTS =====
        let audioContext = null;
        let soundEnabled = true;

        // Initialize audio context on first user interaction
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            // Resume context if suspended
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // Create short click sounds
        function createClick(frequency, duration = 0.03, volume = 0.15) {
            if (!soundEnabled || !audioContext) return;
            
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'square';
                
                const now = audioContext.currentTime;
                gainNode.gain.setValueAtTime(volume, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                
                oscillator.start(now);
                oscillator.stop(now + duration);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }

        function playSound(soundType) {
            initAudio(); // Ensure audio context is ready
            
            switch(soundType) {
                case 'brickBreak':
                    createClick(1200, 0.04, 0.2);
                    break;
                case 'paddleHit':
                    createClick(800, 0.03, 0.15);
                    break;
                case 'wallHit':
                    createClick(600, 0.02, 0.1);
                    break;
                case 'gameOver':
                    createClick(400, 0.1, 0.2);
                    setTimeout(() => createClick(300, 0.15, 0.2), 120);
                    break;
                case 'levelUp':
                    createClick(800, 0.06, 0.2);
                    setTimeout(() => createClick(1000, 0.06, 0.2), 80);
                    setTimeout(() => createClick(1200, 0.1, 0.2), 160);
                    break;
            }
        }

        // ===== PARTICLE SYSTEM =====
        let particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4 - 2;
                this.life = 1.0;
                this.size = Math.random() * 3 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // gravity
                this.life -= 0.02;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = FG_COLOR;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function createParticles(x, y, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function updateParticles() {
            particles = particles.filter(p => !p.isDead());
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }

        // ===== LEADERBOARD (FIREBASE OR LOCAL) =====
        function getLeaderboard(callback) {
            if (firebaseEnabled) {
                database.ref('leaderboard').orderByChild('score').limitToLast(5).once('value')
                    .then(snapshot => {
                        const scores = [];
                        snapshot.forEach(child => {
                            scores.push(child.val());
                        });
                        callback(scores.reverse()); // Highest first
                    })
                    .catch(() => {
                        callback(getLocalLeaderboard());
                    });
            } else {
                callback(getLocalLeaderboard());
            }
        }

        function getLocalLeaderboard() {
            const saved = localStorage.getItem('brickBreakerLeaderboard');
            return saved ? JSON.parse(saved) : [];
        }

        function saveLocalLeaderboard(leaderboard) {
            localStorage.setItem('brickBreakerLeaderboard', JSON.stringify(leaderboard));
        }

        function addScore(name, score) {
            if (firebaseEnabled) {
                // Add to Firebase
                database.ref('leaderboard').push({
                    name: name,
                    score: score,
                    timestamp: Date.now()
                }).then(() => {
                    displayLeaderboard();
                });
            } else {
                // Local storage fallback
                let leaderboard = getLocalLeaderboard();
                leaderboard.push({ name, score });
                leaderboard.sort((a, b) => b.score - a.score);
                leaderboard = leaderboard.slice(0, 5);
                saveLocalLeaderboard(leaderboard);
                displayLeaderboard();
            }
        }

        function isHighScore(score, callback) {
            getLeaderboard(leaderboard => {
                if (leaderboard.length < 5) {
                    callback(true);
                } else {
                    callback(score > leaderboard[4].score);
                }
            });
        }

        function displayLeaderboard() {
            getLeaderboard(leaderboard => {
                if (leaderboard.length === 0) {
                    leaderboardList.innerHTML = '<div style="text-align: center; padding: 10px; color: #555; font-size: 11px;">No scores yet!</div>';
                    return;
                }

                leaderboardList.innerHTML = leaderboard.map((entry, index) => `
                    <div class="leaderboard-entry">
                        <span class="leaderboard-rank">${index + 1}.</span>
                        <span class="leaderboard-name">${entry.name}</span>
                        <span class="leaderboard-score">${entry.score}</span>
                    </div>
                `).join('');
            });
        }

        // Game variables
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameRunning = false;
        let animationId;

        // Detect mobile device
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Adjust speed for mobile (mobile devices often have lower frame rates)
        const speedMultiplier = isMobile ? 1.5 : 1;

        // Fireball power-up
        let fireballActive = false;
        let fireballEndTime = 0;
        let fireballActivated = false; // Track if fireball was activated (timer starts on ball launch)
        
        // Mine power-up
        let mineActive = false;
        let mineEndTime = 0;
        let mineActivated = false; // Track if mine was activated (timer starts on ball launch)

        // Paddle
        const paddle = {
            width: 50,
            height: 6,
            x: canvas.width / 2 - 25,
            y: canvas.height - 20,
            speed: 8
        };

        // Ball - Speed adjusted for mobile - launches straight up
        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 30,
            radius: 3,
            dx: 0,  // No horizontal movement - straight up
            dy: -3 * speedMultiplier,  // Slightly faster vertical for better gameplay
            launched: false
        };

        // Bricks
        const brickRowCount = 6;
        const brickColumnCount = 10;
        const brickWidth = 28;
        const brickHeight = 8;
        const brickPadding = 4;
        const brickOffsetTop = 20;
        const brickOffsetLeft = 4;

        let bricks = [];

        // Initialize bricks
        function createBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        // Draw bricks in monochrome iPod style
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        // Solid black brick
                        ctx.fillStyle = FG_COLOR;
                        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
                        
                        // Inner border for depth
                        ctx.strokeStyle = BG_COLOR;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(brickX + 1, brickY + 1, brickWidth - 2, brickHeight - 2);
                    }
                }
            }
        }

        // Draw paddle
        function drawPaddle() {
            ctx.fillStyle = FG_COLOR;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        // Draw ball
        function drawBall() {
            if (fireballActive) {
                // Draw fireball effect
                const time = Date.now() / 100;
                
                // Draw flame particles around ball
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2 + time;
                    const distance = 3 + Math.sin(time + i) * 2;
                    const flameX = ball.x + Math.cos(angle) * distance;
                    const flameY = ball.y + Math.sin(angle) * distance;
                    
                    ctx.fillStyle = FG_COLOR;
                    ctx.globalAlpha = 0.5 + Math.sin(time * 2 + i) * 0.3;
                    ctx.beginPath();
                    ctx.arc(flameX, flameY, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }
            
            if (mineActive) {
                // Draw bomb effect - bomb shape with fuse
                ctx.fillStyle = FG_COLOR;
                ctx.strokeStyle = FG_COLOR;
                ctx.lineWidth = 1;
                
                // Draw fuse (small line on top)
                const fuseX = ball.x - 1;
                const fuseY = ball.y - ball.radius - 3;
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y - ball.radius);
                ctx.lineTo(fuseX, fuseY);
                ctx.stroke();
                
                // Draw fuse spark (small circle at tip)
                ctx.beginPath();
                ctx.arc(fuseX, fuseY, 1, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw shine line on bomb body for 3D effect
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.arc(ball.x - 1, ball.y - 1, ball.radius - 1, 0, Math.PI * 2);
                ctx.strokeStyle = BG_COLOR;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }
            
            // Draw main ball
            ctx.fillStyle = FG_COLOR;
            ctx.beginPath();
            ctx.arc(Math.floor(ball.x), Math.floor(ball.y), ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        }

        // Move ball
        function moveBall() {
            if (!ball.launched) {
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius - 2;
                return;
            }

            // Start power-up timers when ball is first launched after activation
            if (fireballActivated && fireballEndTime === 0) {
                fireballEndTime = Date.now() + 3000;
            }
            if (mineActivated && mineEndTime === 0) {
                mineEndTime = Date.now() + 3000;
            }

            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (left and right) - FIX: Prevent ball from getting stuck
            if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius; // Push ball back inside
                ball.dx *= -1;
                playSound('wallHit');
            }
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius; // Push ball back inside
                ball.dx *= -1;
                playSound('wallHit');
            }

            // Wall collision (top)
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius; // Push ball back inside
                ball.dy *= -1;
                playSound('wallHit');
            }

            // Paddle collision
            if (ball.y + ball.radius >= paddle.y &&
                ball.y - ball.radius <= paddle.y + paddle.height &&
                ball.x >= paddle.x &&
                ball.x <= paddle.x + paddle.width) {
                
                // Calculate hit position for angle
                let hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 6 * speedMultiplier;
                ball.dy = -Math.abs(ball.dy);
                playSound('paddleHit');
            }

            // Bottom wall - lose a life
            if (ball.y - ball.radius > canvas.height) {
                lives--;
                livesEl.textContent = lives;
                
                if (lives === 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }
        }

        // Collision detection
        function collisionDetection() {
            // Check if fireball expired
            if (fireballActive && fireballEndTime > 0 && Date.now() > fireballEndTime) {
                fireballActive = false;
                fireballActivated = false;
                fireballEndTime = 0;
                messageEl.textContent = 'FIREBALL ENDED';
                setTimeout(() => messageEl.textContent = '', 1000);
            }
            
            // Check if mine expired
            if (mineActive && mineEndTime > 0 && Date.now() > mineEndTime) {
                mineActive = false;
                mineActivated = false;
                mineEndTime = 0;
                messageEl.textContent = 'MINE ENDED';
                setTimeout(() => messageEl.textContent = '', 1000);
            }

            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (ball.x + ball.radius > b.x &&
                            ball.x - ball.radius < b.x + brickWidth &&
                            ball.y + ball.radius > b.y &&
                            ball.y - ball.radius < b.y + brickHeight) {
                            
                            // Only bounce if NOT fireball
                            if (!fireballActive) {
                                ball.dy *= -1;
                            }
                            
                            b.status = 0;
                            score += 10;
                            scoreEl.textContent = score;

                            // Add particle effect and sound
                            createParticles(b.x + brickWidth / 2, b.y + brickHeight / 2, fireballActive ? 15 : 10);
                            playSound('brickBreak');
                            
                            // Mine destroys surrounding bricks
                            if (mineActive) {
                                // Destroy bricks in surrounding area (one brick in each direction)
                                const neighbors = [
                                    [c-1, r], [c+1, r],  // Left, Right
                                    [c, r-1], [c, r+1],  // Top, Bottom
                                    [c-1, r-1], [c+1, r-1],  // Diagonals
                                    [c-1, r+1], [c+1, r+1]
                                ];
                                
                                neighbors.forEach(([nc, nr]) => {
                                    if (nc >= 0 && nc < brickColumnCount && nr >= 0 && nr < brickRowCount) {
                                        if (bricks[nc][nr].status === 1) {
                                            bricks[nc][nr].status = 0;
                                            score += 10;
                                            scoreEl.textContent = score;
                                            const nb = bricks[nc][nr];
                                            createParticles(nb.x + brickWidth / 2, nb.y + brickHeight / 2, 8);
                                        }
                                    }
                                });
                            }

                            // Check win
                            let allDestroyed = true;
                            for (let cc = 0; cc < brickColumnCount; cc++) {
                                for (let rr = 0; rr < brickRowCount; rr++) {
                                    if (bricks[cc][rr].status === 1) {
                                        allDestroyed = false;
                                        break;
                                    }
                                }
                                if (!allDestroyed) break;
                            }
                            
                            if (allDestroyed) {
                                nextLevel();
                            }
                            
                            // If fireball, don't stop checking - keep breaking bricks
                            if (!fireballActive) {
                                return; // Stop checking other bricks for normal ball
                            }
                        }
                    }
                }
            }
        }

        // Reset ball
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 30;
            ball.dx = 0;  // Straight up
            ball.dy = -3 * speedMultiplier;
            ball.launched = false;
            paddle.x = canvas.width / 2 - paddle.width / 2;
        }

        // Next level
        function nextLevel() {
            level++;
            ball.dx *= 1.1;
            ball.dy *= 1.1;
            createBricks();
            resetBall();
            playSound('levelUp');
            
            // Award extra life for clearing level
            lives++;
            livesEl.textContent = lives;
            
            // Track level completion
            trackEvent('level_complete', {
                event_category: 'Game',
                event_label: 'Level ' + (level - 1),
                value: level - 1
            });
            
            messageEl.textContent = `LEVEL ${level} +1 LIFE!`;
            setTimeout(() => messageEl.textContent = '', 1500);
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            playSound('gameOver');
            
            // Track game over
            trackEvent('game_over', {
                event_category: 'Game',
                event_label: 'Final Score',
                value: score
            });
            
            // Always show name input modal
            finalScoreEl.textContent = score;
            promoSection.style.display = 'block';
            promoCodeInput.value = '';
            promoMessage.textContent = '';
            
            // Check if it's a high score and update title
            isHighScore(score, (isHigh) => {
                if (isHigh) {
                    modalTitle.textContent = '🎉 NEW HIGH SCORE!';
                    trackEvent('high_score', {
                        event_category: 'Achievement',
                        event_label: 'New High Score',
                        value: score
                    });
                } else {
                    modalTitle.textContent = '💀 GAME OVER';
                }
                nameModal.style.display = 'flex';
            });
        }

        // Draw everything
        function draw() {
            // Clear with background color
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawPaddle();
            drawBall();
            updateParticles();  // Draw particles
            collisionDetection();
            updatePaddleFromKeys();  // Update paddle from keyboard
            moveBall();

            if (gameRunning) {
                animationId = requestAnimationFrame(draw);
            }
        }

        // Touch controls for mobile
        function handleTouch(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const touchX = (touch.clientX - rect.left) * scaleX;
            
            paddle.x = touchX - paddle.width / 2;
            
            // Keep paddle in bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTouch(e);
            if (gameRunning && !ball.launched) {
                ball.launched = true;
                messageEl.textContent = '';
            }
        });

        canvas.addEventListener('touchmove', handleTouch);

        // Mouse controls for desktop
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const mouseX = (e.clientX - rect.left) * scaleX;
            paddle.x = mouseX - paddle.width / 2;

            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        });

        canvas.addEventListener('click', () => {
            if (gameRunning && !ball.launched) {
                ball.launched = true;
                messageEl.textContent = '';
            }
        });

        // Keyboard controls
        let keys = {
            left: false,
            right: false
        };

        document.addEventListener('keydown', (e) => {
            // Don't intercept keys if typing in input field
            if (document.activeElement === playerNameInput) {
                return;
            }
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = true;
                e.preventDefault();
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = true;
                e.preventDefault();
            }
            if (e.key === ' ' || e.key === 'Spacebar' || e.key === 'ArrowUp') {
                if (gameRunning && !ball.launched) {
                    ball.launched = true;
                    messageEl.textContent = '';
                }
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            // Don't intercept keys if typing in input field
            if (document.activeElement === playerNameInput) {
                return;
            }
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = false;
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = false;
            }
        });

        function updatePaddleFromKeys() {
            if (keys.left) {
                paddle.x -= paddle.speed;
            }
            if (keys.right) {
                paddle.x += paddle.speed;
            }
            
            // Keep paddle in bounds
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        }

        // Start game
        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            messageEl.textContent = 'TAP TO LAUNCH';
            
            // Initialize audio on first interaction
            initAudio();
            
            // Track game start
            trackEvent('game_start', {
                event_category: 'Game',
                event_label: 'New Game'
            });
            
            createBricks();
            resetBall();
            
            gameRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block'; // Show pause button
            fireballBtn.style.display = 'inline-block'; // Show fireball button
            mineBtn.style.display = 'inline-block'; // Show mine button
            draw();
        }

        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        });

        // Pause button handler
        let isPaused = false;
        pauseBtn.addEventListener('click', () => {
            if (gameRunning) {
                if (isPaused) {
                    // Resume
                    isPaused = false;
                    pauseBtn.textContent = '⏸ PAUSE';
                    messageEl.textContent = '';
                    draw();
                } else {
                    // Pause
                    isPaused = true;
                    pauseBtn.textContent = '▶ RESUME';
                    messageEl.textContent = 'PAUSED';
                    cancelAnimationFrame(animationId);
                }
            }
        });

        // Fireball button handler
        fireballBtn.addEventListener('click', () => {
            if (gameRunning && !fireballActive && !mineActive) {
                // Pause game
                cancelAnimationFrame(animationId);
                fireballModal.style.display = 'flex';
                fireballPromoInput.focus();
            }
        });

        // Mine button handler
        mineBtn.addEventListener('click', () => {
            if (gameRunning && !fireballActive && !mineActive) {
                // Pause game
                cancelAnimationFrame(animationId);
                mineModal.style.display = 'flex';
                minePromoInput.focus();
            }
        });

        // Name modal handlers
        submitScoreBtn.addEventListener('click', () => {
            const name = playerNameInput.value.trim() || 'Player';
            const promo = promoCodeInput.value.trim().toUpperCase();
            
            // Check promo code
            if (promo === 'GR8PROMO') {
                // Grant 3 extra lives and continue game
                lives = 3;
                livesEl.textContent = lives;
                nameModal.style.display = 'none';
                playerNameInput.value = '';
                promoCodeInput.value = '';
                
                // Save score with name
                addScore(name, score);
                
                // Continue game
                messageEl.textContent = '+3 LIVES! CONTINUE!';
                setTimeout(() => messageEl.textContent = '', 2000);
                
                resetBall();
                gameRunning = true;
                draw();
                
                // Track promo usage
                trackEvent('promo_used', {
                    event_category: 'Promo',
                    event_label: 'GR8PROMO',
                    value: score
                });
            } else if (promo && promo !== '') {
                // Invalid promo
                promoMessage.textContent = '❌ Invalid promo code';
                promoMessage.style.color = '#d00';
                setTimeout(() => {
                    promoMessage.textContent = '';
                    promoMessage.style.color = '#000';
                }, 2000);
            } else {
                // No promo - just save score and end
                addScore(name, score);
                nameModal.style.display = 'none';
                playerNameInput.value = '';
                promoCodeInput.value = '';
                pauseBtn.style.display = 'none';
                fireballBtn.style.display = 'none'; // Hide fireball button
                mineBtn.style.display = 'none'; // Hide mine button
                messageEl.textContent = `GAME OVER - ${score}`;
                startBtn.textContent = '▶ RETRY';
                startBtn.style.display = 'inline-block';
            }
        });

        skipScoreBtn.addEventListener('click', () => {
            nameModal.style.display = 'none';
            playerNameInput.value = '';
            promoCodeInput.value = '';
            pauseBtn.style.display = 'none';
            fireballBtn.style.display = 'none'; // Hide fireball button
            mineBtn.style.display = 'none'; // Hide mine button
            messageEl.textContent = `GAME OVER - ${score}`;
            startBtn.textContent = '▶ RETRY';
            startBtn.style.display = 'inline-block';
        });

        // Allow Enter key to submit
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitScoreBtn.click();
            }
        });

        // Fireball modal handlers
        activateFireballBtn.addEventListener('click', () => {
            const code = fireballPromoInput.value.trim().toUpperCase();
            
            if (code === 'FIRE') {
                // Activate fireball (timer starts when ball is launched)
                fireballActive = true;
                fireballActivated = true;
                fireballEndTime = 0; // Will be set when ball is launched
                fireballModal.style.display = 'none';
                fireballPromoInput.value = '';
                messageEl.textContent = '🔥 FIREBALL READY!';
                setTimeout(() => {
                    if (ball.launched) {
                        messageEl.textContent = '';
                    }
                }, 1000);
                
                // Resume game
                if (gameRunning) {
                    draw();
                }
                
                // Track fireball activation
                trackEvent('powerup_used', {
                    event_category: 'Powerup',
                    event_label: 'Fireball',
                    value: 1
                });
            } else {
                fireballMessage.textContent = '❌ Invalid code';
                fireballMessage.style.color = '#d00';
                setTimeout(() => {
                    fireballMessage.textContent = '';
                    fireballMessage.style.color = '#000';
                }, 2000);
            }
        });

        cancelFireballBtn.addEventListener('click', () => {
            fireballModal.style.display = 'none';
            fireballPromoInput.value = '';
            fireballMessage.textContent = '';
            
            // Resume game
            if (gameRunning) {
                draw();
            }
        });

        // Mine modal handlers
        activateMineBtn.addEventListener('click', () => {
            const code = minePromoInput.value.trim().toUpperCase();
            
            if (code === 'MINE') {
                // Activate mine (timer starts when ball is launched)
                mineActive = true;
                mineActivated = true;
                mineEndTime = 0; // Will be set when ball is launched
                mineModal.style.display = 'none';
                minePromoInput.value = '';
                messageEl.textContent = '💣 MINE READY!';
                setTimeout(() => {
                    if (ball.launched) {
                        messageEl.textContent = '';
                    }
                }, 1000);
                
                // Resume game
                if (gameRunning) {
                    draw();
                }
                
                // Track mine activation
                trackEvent('powerup_used', {
                    event_category: 'Powerup',
                    event_label: 'Mine',
                    value: 1
                });
            } else {
                mineMessage.textContent = '❌ Invalid code';
                mineMessage.style.color = '#d00';
                setTimeout(() => {
                    mineMessage.textContent = '';
                    mineMessage.style.color = '#000';
                }, 2000);
            }
        });

        cancelMineBtn.addEventListener('click', () => {
            mineModal.style.display = 'none';
            minePromoInput.value = '';
            mineMessage.textContent = '';
            
            // Resume game
            if (gameRunning) {
                draw();
            }
        });

        // Press 'F' key during game to open fireball modal
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'f' || e.key === 'F') && gameRunning && !fireballActive && !mineActive) {
                if (document.activeElement !== playerNameInput && 
                    document.activeElement !== promoCodeInput &&
                    document.activeElement !== fireballPromoInput &&
                    document.activeElement !== minePromoInput) {
                    // Pause game
                    cancelAnimationFrame(animationId);
                    fireballModal.style.display = 'flex';
                    fireballPromoInput.focus();
                    e.preventDefault();
                }
            }
            
            // Press 'M' key during game to open mine modal
            if ((e.key === 'm' || e.key === 'M') && gameRunning && !fireballActive && !mineActive) {
                if (document.activeElement !== playerNameInput && 
                    document.activeElement !== promoCodeInput &&
                    document.activeElement !== fireballPromoInput &&
                    document.activeElement !== minePromoInput) {
                    // Pause game
                    cancelAnimationFrame(animationId);
                    mineModal.style.display = 'flex';
                    minePromoInput.focus();
                    e.preventDefault();
                }
            }
        });

        // Initial draw and leaderboard display
        displayLeaderboard();
        createBricks();
        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawPaddle();
        drawBall();
    </script>
</body>
</html>
