<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake — Nokia 3310</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --nokia-body:  #3a3a4a;
    --nokia-light: #4e4e60;
    --nokia-dark:  #2a2a38;
    --screen-bg:   #8bac0f;
    --screen-dark: #0f380f;
    --screen-light:#9bbc0f;
    --screen-mid:  #306230;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'VT323', monospace;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(26,26,80,0.8) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(10,10,50,0.6) 0%, transparent 50%);
  }

  /* ── Phone shell — fluid width ── */
  .phone {
    width: min(440px, 96vw);
    background: linear-gradient(160deg, var(--nokia-light) 0%, var(--nokia-body) 40%, var(--nokia-dark) 100%);
    border-radius: clamp(20px, 5vw, 40px) clamp(20px, 5vw, 40px) clamp(28px, 7vw, 52px) clamp(28px, 7vw, 52px);
    padding: clamp(14px, 3vw, 26px) clamp(14px, 3.5vw, 24px) clamp(20px, 4vw, 34px);
    box-shadow:
      0 0 0 2px #222230,
      0 24px 70px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 -2px 4px rgba(0,0,0,0.5);
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }

  .phone::before {
    content: '';
    position: absolute;
    top: 10px; left: 12px; right: 12px;
    height: 35%;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
    border-radius: 24px 24px 0 0;
    pointer-events: none;
  }

  /* ── Brand ── */
  .brand {
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 2vw, 13px);
    letter-spacing: 7px;
    text-transform: uppercase;
    margin-bottom: clamp(8px, 2vw, 14px);
    padding-top: 2px;
  }

  /* ── Screen bezel ── */
  .screen-bezel {
    background: #080810;
    border-radius: 10px;
    padding: clamp(8px, 2vw, 13px);
    box-shadow:
      inset 0 3px 10px rgba(0,0,0,0.95),
      inset 0 0 0 1px rgba(0,0,0,0.6),
      0 1px 0 rgba(255,255,255,0.05);
    margin-bottom: clamp(14px, 3vw, 22px);
  }

  /* ── Green screen ── */
  .screen-inner {
    background: var(--screen-bg);
    border-radius: 5px;
    padding: 6px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 0 24px rgba(0,0,0,0.2),
      0 0 12px rgba(139,172,15,0.35);
  }

  .screen-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    border-radius: 5px;
    z-index: 5;
  }

  /* ── HUD ── */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    padding: 0 2px;
  }
  .hud-text {
    font-family: 'VT323', monospace;
    font-size: clamp(14px, 3.5vw, 18px);
    color: var(--screen-dark);
    line-height: 1;
  }
  .speed-dots { display: flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--screen-dark); opacity: 0.25; }
  .dot.active { opacity: 1; }

  /* ── Canvas — fills available width ── */
  .canvas-wrap {
    position: relative;
    line-height: 0;
    width: 100%;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ── Overlay ── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--screen-bg);
    border-radius: 3px;
    z-index: 10;
    gap: 6px;
  }
  .overlay.hidden { display: none; }
  .overlay-title {
    font-family: 'VT323', monospace;
    font-size: clamp(30px, 8vw, 48px);
    color: var(--screen-dark);
    line-height: 1;
    letter-spacing: 3px;
  }
  .overlay-sub {
    font-family: 'VT323', monospace;
    font-size: clamp(13px, 3.5vw, 18px);
    color: var(--screen-mid);
    text-align: center;
    line-height: 1.3;
  }
  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Top control row (Pause + Speed) ── */
  .controls-top {
    display: flex;
    justify-content: center;
    gap: clamp(10px, 3vw, 20px);
    margin-bottom: clamp(12px, 3vw, 20px);
  }
  .btn-small {
    background: linear-gradient(160deg, #555568, #2a2a38);
    color: rgba(255,255,255,0.75);
    border: none;
    border-radius: 10px;
    padding: clamp(7px, 1.5vw, 11px) clamp(18px, 5vw, 34px);
    font-family: 'VT323', monospace;
    font-size: clamp(14px, 3.5vw, 18px);
    cursor: pointer;
    box-shadow: 0 4px 0 #111120, inset 0 1px 0 rgba(255,255,255,0.12);
    transition: transform 0.08s, box-shadow 0.08s;
    letter-spacing: 1px;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-small:active { transform: translateY(3px); box-shadow: 0 1px 0 #111120; }

  /* ── Hint ── */
  .hint {
    text-align: center;
    color: rgba(255,255,255,0.12);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(8px, 1.8vw, 10px);
    letter-spacing: 1.5px;
    margin-top: clamp(8px, 2vw, 13px);
    text-transform: uppercase;
  }
  /* Hide keyboard hint on touch devices */
  @media (hover: none) { .hint { display: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="brand">Nokia</div>

  <div class="screen-bezel">
    <div class="screen-inner">
      <div class="hud">
        <span class="hud-text">SCR: <span id="score">0</span></span>
        <div class="speed-dots">
          <div class="dot active" id="d1"></div>
          <div class="dot" id="d2"></div>
          <div class="dot" id="d3"></div>
          <div class="dot" id="d4"></div>
          <div class="dot" id="d5"></div>
        </div>
        <span class="hud-text">HI: <span id="hiscore">0</span></span>
      </div>
      <div class="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-title">SNAKE</div>
          <div class="overlay-sub" style="color:var(--screen-dark); letter-spacing:2px;">▓▓▓▓▓▓▓▓▓▓▓▓▓▓</div>
          <div class="overlay-sub blink" id="overlayMsg">TAP OK TO PLAY</div>
          <div class="overlay-sub" id="overlayScore" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Pause / Speed -->
  <div class="controls-top">
    <button class="btn-small" id="btnPause">PAUSE</button>
    <button class="btn-small" id="btnSpeed">SPEED</button>
  </div>

  <div class="hint">Arrow Keys / WASD · Enter to Start · Swipe to Play</div>
</div>

<script>
(function () {
  /* ── Canvas setup ── */
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  const COLS = 25, ROWS = 20;
  // Internal resolution — canvas CSS width is 100% of parent, height scales naturally
  const W = 500, H = 400;
  canvas.width  = W;
  canvas.height = H;
  // aspect ratio locked via CSS: width:100%; height:auto

  const CW = W / COLS;   // 20px per cell
  const CH = H / ROWS;   // 20px per cell

  const C_BG    = '#8bac0f';
  const C_DARK  = '#0f380f';
  const C_MID   = '#306230';
  const C_LIGHT = '#9bbc0f';

  const STEP_MS = [300, 220, 160, 110, 70];

  let snake, prevSnake, dir, food;
  let score = 0, foodEaten = 0, hiScore = 0;
  let running = false, paused = false, gameOver = false;
  let speed = 1;
  let rafId = null, lastStepTs = 0, interpT = 0;

  /* ── Helpers ── */
  const stepMs     = () => STEP_MS[speed - 1];
  const cloneSnake = s  => s.map(c => ({ ...c }));

  function updateScore() {
    document.getElementById('score').textContent = score;
    if (score > hiScore) { hiScore = score; document.getElementById('hiscore').textContent = hiScore; }
  }
  function updateSpeedDots() {
    for (let i = 1; i <= 5; i++)
      document.getElementById('d' + i).classList.toggle('active', i <= speed);
  }
  function placeFood() {
    let p;
    do { p = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
    while (snake.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  /* ── Init ── */
  function init() {
    const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
    snake     = [{ x: mx, y: my }, { x: mx-1, y: my }, { x: mx-2, y: my }];
    prevSnake = cloneSnake(snake);
    dir = { x: 1, y: 0 };
    score = foodEaten = interpT = 0;
    updateScore();
    placeFood();
    gameOver = paused = false;
  }

  /* ── Logic step ── */
  function step() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
    if (snake.some(s => s.x === head.x && s.y === head.y))             { endGame(); return; }

    prevSnake = cloneSnake(snake);
    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += speed * 10; foodEaten++;
      updateScore(); placeFood();
      if (foodEaten % 5 === 0 && speed < 5) { speed++; updateSpeedDots(); }
      prevSnake.push(prevSnake[prevSnake.length - 1]);
    } else {
      snake.pop();
    }
  }

  /* ── rAF loop ── */
  function loop(ts) {
    if (!running) return;
    rafId = requestAnimationFrame(loop);
    if (paused) return;
    const elapsed = ts - lastStepTs;
    const ms = stepMs();
    interpT = Math.min(elapsed / ms, 1);
    if (elapsed >= ms) { step(); if (!running) return; lastStepTs = ts; interpT = 0; }
    draw(interpT);
  }

  /* ── Draw ── */
  function draw(t = 1) {
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, W, H);

    // Grid dots
    ctx.fillStyle = C_LIGHT;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        ctx.fillRect(c * CW + CW/2 - 0.5, r * CH + CH/2 - 0.5, 1.5, 1.5);

    // Food
    const fx = food.x * CW, fy = food.y * CH;
    ctx.fillStyle = C_DARK;
    ctx.fillRect(fx+3, fy+1, CW-6, CH-2);
    ctx.fillRect(fx+1, fy+3, CW-2, CH-6);

    // Snake
    for (let i = 0; i < snake.length; i++) {
      const cur  = snake[i];
      const prev = prevSnake[i] || cur;
      const px   = (prev.x + (cur.x - prev.x) * t) * CW;
      const py   = (prev.y + (cur.y - prev.y) * t) * CH;

      if (i === 0) {
        ctx.fillStyle = C_DARK;
        ctx.fillRect(px+1, py+1, CW-2, CH-2);
        ctx.fillStyle = C_BG;
        if      (dir.x ===  1) { ctx.fillRect(px+CW-5,py+3,3,3); ctx.fillRect(px+CW-5,py+CH-6,3,3); }
        else if (dir.x === -1) { ctx.fillRect(px+2,py+3,3,3);    ctx.fillRect(px+2,py+CH-6,3,3); }
        else if (dir.y === -1) { ctx.fillRect(px+3,py+2,3,3);    ctx.fillRect(px+CW-6,py+2,3,3); }
        else                   { ctx.fillRect(px+3,py+CH-5,3,3); ctx.fillRect(px+CW-6,py+CH-5,3,3); }
      } else {
        ctx.fillStyle = i % 2 === 0 ? C_DARK : C_MID;
        ctx.fillRect(px+1, py+1, CW-2, CH-2);
      }
    }
  }

  /* ── End ── */
  function endGame() {
    running = false; gameOver = true;
    cancelAnimationFrame(rafId);
    let f = 0;
    const fi = setInterval(() => {
      ctx.fillStyle = f++ % 2 === 0 ? C_DARK : C_BG;
      ctx.fillRect(0, 0, W, H);
      if (f >= 6) { clearInterval(fi); draw(1); showOverlay('GAME OVER', 'SCORE: ' + score, 'TAP OK'); }
    }, 100);
  }

  /* ── Overlays ── */
  function showOverlay(title, sub, msg) {
    const ov = document.getElementById('overlay');
    ov.classList.remove('hidden');
    ov.querySelector('.overlay-title').textContent = title;
    document.getElementById('overlayMsg').textContent = msg;
    const sc = document.getElementById('overlayScore');
    if (sub) { sc.style.display = 'block'; sc.textContent = sub; } else { sc.style.display = 'none'; }
  }
  function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

  /* ── Start ── */
  function startGame() {
    cancelAnimationFrame(rafId);
    init(); hideOverlay();
    running = true; speed = 1;
    updateSpeedDots();
    lastStepTs = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  /* ── Direction — applied immediately, one queued buffer ── */
  let dirQueue = [];   // holds at most 1 pending direction change

  function setDir(dx, dy) {
    if (!running || paused) return;
    // Use latest committed direction to validate (not the buffered one)
    const base = dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
    if (dx ===  1 && base.x === -1) return;
    if (dx === -1 && base.x ===  1) return;
    if (dy ===  1 && base.y === -1) return;
    if (dy === -1 && base.y ===  1) return;
    // Replace any pending queue entry — only buffer one turn ahead
    dirQueue = [{ x: dx, y: dy }];
  }

  /* ── Logic step — consume from queue ── */
  function step() {
    if (dirQueue.length) dir = dirQueue.shift();
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
    if (snake.some(s => s.x === head.x && s.y === head.y))             { endGame(); return; }

    prevSnake = cloneSnake(snake);
    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += speed * 10; foodEaten++;
      updateScore(); placeFood();
      if (foodEaten % 5 === 0 && speed < 5) { speed++; updateSpeedDots(); }
      prevSnake.push(prevSnake[prevSnake.length - 1]);
    } else {
      snake.pop();
    }
  }

  /* ── rAF loop ── */
  function loop(ts) {
    if (!running) return;
    rafId = requestAnimationFrame(loop);
    if (paused) return;
    const elapsed = ts - lastStepTs;
    const ms = stepMs();
    interpT = Math.min(elapsed / ms, 1);
    if (elapsed >= ms) { step(); if (!running) return; lastStepTs = ts; interpT = 0; }
    draw(interpT);
  }

  /* ── Draw ── */
  function draw(t = 1) {
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = C_LIGHT;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        ctx.fillRect(c * CW + CW/2 - 0.5, r * CH + CH/2 - 0.5, 1.5, 1.5);

    const fx = food.x * CW, fy = food.y * CH;
    ctx.fillStyle = C_DARK;
    ctx.fillRect(fx+3, fy+1, CW-6, CH-2);
    ctx.fillRect(fx+1, fy+3, CW-2, CH-6);

    for (let i = 0; i < snake.length; i++) {
      const cur  = snake[i];
      const prev = prevSnake[i] || cur;
      const px   = (prev.x + (cur.x - prev.x) * t) * CW;
      const py   = (prev.y + (cur.y - prev.y) * t) * CH;
      if (i === 0) {
        ctx.fillStyle = C_DARK;
        ctx.fillRect(px+1, py+1, CW-2, CH-2);
        ctx.fillStyle = C_BG;
        if      (dir.x ===  1) { ctx.fillRect(px+CW-5,py+3,3,3); ctx.fillRect(px+CW-5,py+CH-6,3,3); }
        else if (dir.x === -1) { ctx.fillRect(px+2,py+3,3,3);    ctx.fillRect(px+2,py+CH-6,3,3); }
        else if (dir.y === -1) { ctx.fillRect(px+3,py+2,3,3);    ctx.fillRect(px+CW-6,py+2,3,3); }
        else                   { ctx.fillRect(px+3,py+CH-5,3,3); ctx.fillRect(px+CW-6,py+CH-5,3,3); }
      } else {
        ctx.fillStyle = i % 2 === 0 ? C_DARK : C_MID;
        ctx.fillRect(px+1, py+1, CW-2, CH-2);
      }
    }
  }

  /* ── End ── */
  function endGame() {
    running = false; gameOver = true;
    cancelAnimationFrame(rafId);
    let f = 0;
    const fi = setInterval(() => {
      ctx.fillStyle = f++ % 2 === 0 ? C_DARK : C_BG;
      ctx.fillRect(0, 0, W, H);
      if (f >= 6) { clearInterval(fi); draw(1); showOverlay('GAME OVER', 'SCORE: ' + score, 'TAP TO PLAY AGAIN'); }
    }, 100);
  }

  /* ── Overlays ── */
  function showOverlay(title, sub, msg) {
    const ov = document.getElementById('overlay');
    ov.classList.remove('hidden');
    ov.querySelector('.overlay-title').textContent = title;
    document.getElementById('overlayMsg').textContent = msg;
    const sc = document.getElementById('overlayScore');
    if (sub) { sc.style.display = 'block'; sc.textContent = sub; } else { sc.style.display = 'none'; }
  }
  function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); }

  /* ── Start ── */
  function startGame() {
    cancelAnimationFrame(rafId);
    init(); hideOverlay();
    dirQueue = [];
    running = true; speed = 1;
    updateSpeedDots();
    lastStepTs = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  /* ── Keyboard ── */
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':    case 'w': e.preventDefault(); setDir(0,-1); break;
      case 'ArrowDown':  case 's': e.preventDefault(); setDir(0, 1); break;
      case 'ArrowLeft':  case 'a': e.preventDefault(); setDir(-1,0); break;
      case 'ArrowRight': case 'd': e.preventDefault(); setDir( 1,0); break;
      case 'Enter': case ' ':
        if (!running || gameOver) startGame(); else togglePause(); break;
    }
  });

  /* ── Pause ── */
  function togglePause() {
    if (!running || gameOver) return;
    paused = !paused;
    if (paused) showOverlay('PAUSED', null, 'TAP TO RESUME'); else hideOverlay();
  }

  /* ── Touch on canvas: tap = start/pause, swipe = steer ── */
  let touchStart = null;
  const SWIPE_THRESHOLD = 18; // px on screen

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    touchStart = null;

    if (dist < SWIPE_THRESHOLD) {
      // Tap — start or pause
      if (!running || gameOver) startGame();
      else togglePause();
    } else {
      // Swipe — steer immediately
      if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
      else                              setDir(0, dy > 0 ? 1 : -1);
    }
  }, { passive: false });

  /* ── Top buttons ── */
  document.getElementById('btnPause').addEventListener('click', togglePause);
  document.getElementById('btnSpeed').addEventListener('click', () => {
    if (!running) return;
    speed = speed < 5 ? speed + 1 : 1;
    updateSpeedDots();
  });

  /* ── Init display ── */
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, W, H);
  updateSpeedDots();
})();
</script>
</body>
</html>
